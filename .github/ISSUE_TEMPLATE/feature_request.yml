name: Feature Request
description: "Suggest a new API, behavior, or improvement for Command Framework."
title: "[FEATURE] "
labels: ["enhancement"]
assignees:
  - Despical
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are easiest to evaluate when they include a real Command Framework use case.
  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: What is currently difficult, missing, or awkward in Command Framework?
      placeholder: I cannot easily customize..., register..., parse..., or inject...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or workflow you would like to see.
      placeholder: Add a new API such as `framework.someMethod(...)` or change how an existing feature behaves.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show how the feature would look in a command class or registration flow.
      render: java
      placeholder: |
        framework.someMethod(...);
        
        @Command(name = "example")
        public void example(CommandArguments arguments) {
        }
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Describe any current workaround or why existing APIs are not enough.
      placeholder: I currently work around this by...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any extra details, compatibility notes, or references here.
      render: text
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature if needed.
          required: false
