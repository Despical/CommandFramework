name: Feature Request
description: "Got an idea to make this plugin better? Share your feature requests and help us shape its future!"
title: "[FEATURE] "
labels: ["enhancement"]
assignees:
  - Despical
body:
  - type: markdown
    attributes:
      value: |
        Got a great idea? We'd love to hear it!
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: I'm always frustrated when [...]
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature if needed.
          required: false
