name: Bug Report
description: "Report a bug in Command Framework with enough detail to reproduce it."
title: "[BUG] "
labels: ["bug"]
assignees:
  - Despical
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a Command Framework issue.
        A small reproducible example is the fastest way to get this fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and the behavior you observed.
      placeholder: A command, option, completer, or registration flow behaves differently than expected.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Describe the expected Command Framework behavior.
      placeholder: The command should register, execute, parse options, or complete without errors.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Share the smallest possible reproduction flow.
      placeholder: |
        1. Register the command/completer
        2. Run `/example ...`
        3. Observe the error or incorrect behavior
    validations:
      required: true
  - type: input
    id: framework-version
    attributes:
      label: Command Framework Version
      description: Which Command Framework version are you using?
      placeholder: e.g. 1.6.3
    validations:
      required: true
  - type: input
    id: java-version
    attributes:
      label: Java Version
      description: Which Java version is the project or server running on?
      placeholder: e.g. 21
    validations:
      required: true
  - type: dropdown
    id: server-software
    attributes:
      label: Server Software
      description: Which implementation are you using with Command Framework?
      multiple: true
      options:
        - Spigot
        - Paper
        - Purpur
        - Folia
        - MockBukkit
        - Other
    validations:
      required: true
  - type: textarea
    id: command-example
    attributes:
      label: Minimal command example
      description: Paste the smallest relevant command class, registration snippet, or completer setup.
      render: java
      placeholder: |
        @Command(name = "example")
        public void example(CommandArguments arguments) {
            arguments.sendMessage("hello");
        }
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      description: Paste any exception, stack trace, or debug output here.
      render: text
  - type: checkboxes
    id: validation
    attributes:
      label: Validation
      description: Check these before submitting.
      options:
        - label: I have checked for existing issues about this problem.
          required: true
        - label: I included enough information to reproduce the issue.
          required: true
